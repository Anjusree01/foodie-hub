<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <b> anjusree </b> <!-- bold -->
    <br>
    <strong> anjusree </strong> <!-- strong -->
    <i> anjusree </i> <!-- italic -->
    <em> anjusree </em> <!-- emphasis -->
    <mark> anjusree </mark> <!-- marked -->
    <small> anjusree </small> <!-- small -->
    <del> anjusree </del> <!-- deleted -->
    <ins> anjusree </ins> <!-- inserted -->
    <sub> anjusree </sub> <!-- subscript -->
    <sup> anjusree </sup> <!-- superscript -->

    H <sub> 20 </sub>  <!-- subscript example -->
    H <sup> 20 </sup>  <!-- superscript example -->


    <!-- block-level tags-->

    <h1 style = "background-color: lightblue;"> Hii </h1>
    <h2 style = "background-color: lightblue;"> Hii </h2>
    <h3 style = "background-color: lightblue;"> Hii </h3>
    <h4 style = "background-color: lightblue;"> Hii </h4>
    <h5 style = "background-color: lightblue;"> Hii </h5>
    <h6 style = "background-color: lightblue;"> Hii </h6>

    <div style = "background-color: rgb(69, 69, 159);"> Hii </div>
    <hr style = "background-color: rgb(216, 130, 224); height: 20px;"> </hr>
    <ol>
        <li style = "background-color: light rgb(81, 4, 17);"> Hii </li>
    </ol> <!-- horizontal rule -->
    <p style = "background-color: rgb(216, 130, 224);"> Hii, how was your day? </p> <!-- paragraph -->
     <!-- inline tags-->
</body>
</html>
